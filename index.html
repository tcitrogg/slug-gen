<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SLUG // GEN | Tcitrogg</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --surface: #111111;
      --border: #2a2a2a;
      --accent: #c8f03d;
      --accent2: #ff4d4d;
      --text: #e8e8e8;
      --muted: #555;
      --mono: 'Space Mono', monospace;
      --sans: 'Syne', sans-serif;
    }

    html, body {
      /* height: 100%; */
      background: var(--bg);
      color: var(--text);
      font-family: var(--mono);
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
      background-image:
        linear-gradient(rgba(200, 240, 61, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(200, 240, 61, 0.03) 1px, transparent 1px);
      background-size: 40px 40px;
    }

    .container {
      width: 100%;
      max-width: 660px;
    }

    /* Header */
    .header {
      margin-bottom: 3rem;
    }

    .label-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 0.5rem;
    }

    .tag {
      font-size: 0.65rem;
      font-family: var(--mono);
      letter-spacing: 0.15em;
      padding: 2px 8px;
      border: 1px solid var(--accent);
      color: var(--accent);
      text-transform: uppercase;
    }

    .tag.red {
      border-color: var(--accent2);
      color: var(--accent2);
    }

    h1 {
      font-family: var(--sans);
      font-size: clamp(2.8rem, 8vw, 5rem);
      font-weight: 800;
      line-height: 0.9;
      letter-spacing: -0.03em;
      color: var(--text);
    }

    h1 span {
      color: var(--accent);
    }

    .subtitle {
      font-size: 0.75rem;
      color: var(--muted);
      letter-spacing: 0.1em;
      margin-top: 1rem;
      text-transform: uppercase;
    }

    /* Controls */
    .controls {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1px;
      background: var(--border);
      border: 1px solid var(--border);
      margin-bottom: 1px;
    }

    .control-block {
      background: var(--surface);
      padding: 1rem 1.25rem;
    }

    .control-label {
      font-size: 0.6rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.6rem;
    }

    .control-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    input[type="number"] {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--accent);
      font-family: var(--mono);
      font-size: 1.1rem;
      width: 64px;
      padding: 4px 8px;
      outline: none;
      -moz-appearance: textfield;
    }

    input[type="number"]::-webkit-outer-spin-button,
    input[type="number"]::-webkit-inner-spin-button {
      -webkit-appearance: none;
    }

    input[type="number"]:focus {
      border-color: var(--accent);
    }

    .stepper {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .stepper button {
      background: var(--border);
      border: none;
      color: var(--text);
      font-family: var(--mono);
      font-size: 0.65rem;
      padding: 2px 6px;
      cursor: pointer;
      line-height: 1;
      transition: background 0.15s;
    }

    .stepper button:hover {
      background: var(--accent);
      color: var(--bg);
    }

    /* Alphabet toggles */
    .alpha-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }

    .alpha-toggle {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: var(--mono);
      font-size: 0.65rem;
      padding: 3px 7px;
      cursor: pointer;
      transition: all 0.1s;
      text-transform: uppercase;
    }

    .alpha-toggle.on {
      background: var(--accent);
      border-color: var(--accent);
      color: var(--bg);
    }

    .alpha-toggle:hover:not(.on) {
      border-color: var(--text);
      color: var(--text);
    }

    /* Generate button */
    .gen-btn {
      width: 100%;
      padding: 1.2rem 2rem;
      background: var(--accent);
      color: var(--bg);
      border: none;
      font-family: var(--sans);
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.15s;
      position: relative;
      overflow: hidden;
    }

    .gen-btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: white;
      opacity: 0;
      transition: opacity 0.15s;
    }

    .gen-btn:hover::after { opacity: 0.1; }
    .gen-btn:active { transform: scale(0.99); }

    /* Output area */
    .output-area {
      border: 1px solid var(--border);
      background: var(--surface);
      margin-top: 1px;
    }

    .output-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.6rem 1rem;
      border-bottom: 1px solid var(--border);
    }

    .output-title {
      font-size: 0.6rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .clear-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: var(--mono);
      font-size: 0.6rem;
      padding: 2px 8px;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      transition: all 0.15s;
    }

    .clear-btn:hover {
      border-color: var(--accent2);
      color: var(--accent2);
    }

    .slug-list {
      list-style: none;
      max-height: 320px;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    .slug-list::-webkit-scrollbar { width: 4px; }
    .slug-list::-webkit-scrollbar-track { background: transparent; }
    .slug-list::-webkit-scrollbar-thumb { background: var(--border); }

    .slug-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.75rem 1rem;
      border-bottom: 1px solid var(--border);
      animation: slideIn 0.2s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-8px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    .slug-item:last-child { border-bottom: none; }

    .slug-index {
      font-size: 0.6rem;
      color: var(--muted);
      min-width: 28px;
      user-select: none;
    }

    .slug-value {
      flex: 1;
      font-size: 1rem;
      color: var(--accent);
      letter-spacing: 0.05em;
      word-break: break-all;
      padding: 0 1rem;
    }

    .copy-btn {
      background: none;
      border: 1px solid transparent;
      color: var(--muted);
      font-family: var(--mono);
      font-size: 0.65rem;
      padding: 3px 8px;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      transition: all 0.15s;
      white-space: nowrap;
    }

    .copy-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .copy-btn.copied {
      color: var(--bg);
      background: var(--accent);
      border-color: var(--accent);
    }

    .empty-state {
      padding: 3rem 1rem;
      text-align: center;
      color: var(--muted);
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    /* Footer */
    .footer {
      margin-top: 2rem;
      display: flex;
      justify-content: space-between;
      font-size: 0.6rem;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .copy-all-btn {
      background: none;
      border: none;
      color: var(--muted);
      font-family: var(--mono);
      font-size: 0.6rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: color 0.15s;
    }

    .copy-all-btn:hover { color: var(--accent); }
    .powered_by { color: var(--accent); text-decoration: none; }
    .powered_by:hover { opacity: 100; text-decoration: underline; }
  </style>
</head>
<body>
  <div class="container">
    <header class="header">
      <div class="label-row">
        <span class="tag">util</span>
        <span class="tag red">v1.0</span>
      </div>
      <h1>SLUG<br/><span>//</span> GEN</h1>
      <p class="subtitle">Unique ID generator · powered by <a href="https://www.linkedin.com/in/tcitrogg" class="powered_by">Tcitrogg</a></p>
    </header>

    <div class="controls">
      <div class="control-block">
        <div class="control-label">Length</div>
        <div class="control-row">
          <input type="number" id="lengthInput" value="18" min="5" max="64" />
          <div class="stepper">
            <button onclick="step('length', 1)">▲</button>
            <button onclick="step('length', -1)">▼</button>
          </div>
        </div>
      </div>

      <div class="control-block">
        <div class="control-label">Count</div>
        <div class="control-row">
          <input type="number" id="countInput" value="1" min="1" max="50" />
          <div class="stepper">
            <button onclick="step('count', 1)">▲</button>
            <button onclick="step('count', -1)">▼</button>
          </div>
        </div>
      </div>

      <div class="control-block" style="grid-column: span 2;">
        <div class="control-label">Alphabet</div>
        <div class="alpha-grid" id="alphaGrid"></div>
      </div>
    </div>

    <button class="gen-btn" onclick="generateSlugs()">
      ⟶ Generate Slugs
    </button>

    <div class="output-area">
      <div class="output-header">
        <span class="output-title" id="outputTitle">Awaiting generation</span>
        <button class="clear-btn" onclick="clearSlugs()">Clear</button>
      </div>
      <ul class="slug-list" id="slugList">
        <li class="empty-state">[ no slugs generated yet ]</li>
      </ul>
    </div>

    <div class="footer">
      <span id="charsetDisplay">alphabet: —</span>
      <button class="copy-all-btn" onclick="copyAll()">Copy all ↗</button>
    </div>
  </div>

  <script type="module">
    // Inline nanoid (browser-compatible, no CDN needed)
    const urlAlphabet = 'useandom-26T198340PX75pxJACKVERYMINDBUSHWOLF_GQZbfghjklqvwyzrict';

    function nanoid(size = 21, alphabet = urlAlphabet) {
      let id = '';
      const bytes = crypto.getRandomValues(new Uint8Array(size * 2));
      let i = 0;
      while (id.length < size) {
        const byte = bytes[i++ % bytes.length];
        const idx = byte & (alphabet.length - 1 > 0 ? (1 << Math.ceil(Math.log2(alphabet.length))) - 1 : 0);
        if (idx < alphabet.length) id += alphabet[idx];
      }
      return id.slice(0, size);
    }

    // Safer nanoid
    function safeNanoid(size, alphabet) {
      const mask = (2 << (Math.log(alphabet.length - 1) / Math.LN2)) - 1;
      const step = Math.ceil((1.6 * mask * size) / alphabet.length);
      let id = '';
      while (true) {
        const bytes = crypto.getRandomValues(new Uint8Array(step));
        for (let i = 0; i < step; i++) {
          const byte = bytes[i] & mask;
          if (byte < alphabet.length) {
            id += alphabet[byte];
            if (id.length === size) return id;
          }
        }
      }
    }

    // Alphabet groups
    const GROUPS = {
      'a–z': 'abcdefghijklmnopqrstuvwxyz',
      'A–Z': 'ABCDEFGHIJKLMNOPQRSTUVWXYZ',
      '0–9': '0123456789',
      '_-': '_-',
    };

    const active = { 'a–z': true, 'A–Z': true, '0–9': true, '_-': true };

    function buildAlphabet() {
      return Object.entries(active)
        .filter(([, on]) => on)
        .map(([k]) => GROUPS[k])
        .join('');
    }

    function renderAlphaGrid() {
      const grid = document.getElementById('alphaGrid');
      grid.innerHTML = '';
      for (const key of Object.keys(GROUPS)) {
        const btn = document.createElement('button');
        btn.className = 'alpha-toggle' + (active[key] ? ' on' : '');
        btn.textContent = key;
        btn.onclick = () => {
          const next = !active[key];
          const wouldEmpty = Object.entries(active).filter(([k, v]) => k !== key && v).length === 0 && !next;
          if (wouldEmpty) return;
          active[key] = next;
          btn.classList.toggle('on', next);
          updateCharsetDisplay();
        };
        grid.appendChild(btn);
      }
      updateCharsetDisplay();
    }

    function updateCharsetDisplay() {
      const ab = buildAlphabet();
      document.getElementById('charsetDisplay').textContent =
        `alphabet: ${ab.length} chars`;
    }

    window.step = (field, delta) => {
      const el = document.getElementById(field + 'Input');
      const min = parseInt(el.min), max = parseInt(el.max);
      el.value = Math.min(max, Math.max(min, parseInt(el.value) + delta));
    };

    let slugs = [];

    window.generateSlugs = () => {
      const length = Math.min(64, Math.max(4, parseInt(document.getElementById('lengthInput').value) || 12));
      const count  = Math.min(50, Math.max(1, parseInt(document.getElementById('countInput').value) || 5));
      const ab = buildAlphabet();
      if (!ab) return;

      slugs = Array.from({ length: count }, () => safeNanoid(length, ab));
      renderSlugs();
    };

    function renderSlugs() {
      const list = document.getElementById('slugList');
      const title = document.getElementById('outputTitle');

      if (slugs.length === 0) {
        list.innerHTML = '<li class="empty-state">[ no slugs generated yet ]</li>';
        title.textContent = 'Awaiting generation';
        return;
      }

      title.textContent = `${slugs.length} slug${slugs.length !== 1 ? 's' : ''} generated`;
      list.innerHTML = slugs.map((s, i) => `
        <li class="slug-item">
          <span class="slug-index">${String(i + 1).padStart(2, '0')}</span>
          <span class="slug-value">${s}</span>
          <button class="copy-btn" onclick="copySingle(this, '${s}')">copy</button>
        </li>
      `).join('');
    }

    window.clearSlugs = () => {
      slugs = [];
      renderSlugs();
    };

    window.copySingle = (btn, text) => {
      navigator.clipboard.writeText(text).then(() => {
        btn.textContent = '✓ copied';
        btn.classList.add('copied');
        setTimeout(() => {
          btn.textContent = 'copy';
          btn.classList.remove('copied');
        }, 1500);
      });
    };

    window.copyAll = () => {
      if (!slugs.length) return;
      navigator.clipboard.writeText(slugs.join('\n')).then(() => {
        const btn = document.querySelector('.copy-all-btn');
        btn.textContent = '✓ copied all';
        setTimeout(() => btn.textContent = 'Copy all ↗', 1500);
      });
    };

    // Init
    renderAlphaGrid();
  </script>
</body>
</html>
